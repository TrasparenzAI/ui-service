[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:badge]
command=ts-node /app/badge/index.js
directory=/app/badge
autostart=true
autorestart=true
environment=RESULT_API_URL="%(ENV_RESULT_API_URL)s",COMPANY_API_URL="%(ENV_COMPANY_API_URL)s",RULE_API_URL="%(ENV_RULE_API_URL)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0