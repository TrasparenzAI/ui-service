<div class="container">
    <div class="card shadow mt-2">
        <div class="d-flex justify-content-center">
            <div class="w-100 font-weight-bold text-monospace text-center text-primary-dark" style="height:50vh !important">
                @if (loadingChart()) {
                    <div class="h-100">
                        <div class="d-flex justify-content-center">
                            <div class="loading cursor-wait position-relative"></div>
                        </div>
                    </div>
                } @else {
                    <div style="height:50vh; width:100%"
                        echarts
                        [options]="chartOptions">
                    </div>
                }
            </div>
        </div>
    </div>
</div>
@if (filterFormSearch) {
  <result-list [filterForm]="filterFormSearch" showGaugeBands="true"></result-list>
}
